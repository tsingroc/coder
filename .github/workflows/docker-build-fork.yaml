# Docker Image Build for Fork Repository
# This workflow builds and pushes Docker images for tsingroc/coder fork
name: Docker Build (Fork)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push Docker image to registry'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CODER_FORCE_VERSION: "2.0.0-custom"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Go build tools
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/golang/mock/mockgen@latest
          go install storj.io/drpc/cmd/protoc-gen-go-drpc@latest

      - name: Generate code
        run: |
          make gen/mark-fresh

      - name: Build Coder binary (amd64)
        run: |
          version="${CODER_FORCE_VERSION}"
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o "build/coder-slim_${version}_linux_amd64" -ldflags="-s -w" ./cmd/coder
          chmod +x "build/coder-slim_${version}_linux_amd64"
          # Create a copy named 'coder' for the Dockerfile
          cp "build/coder-slim_${version}_linux_amd64" build/coder
          ls -lh build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.8.0
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/coder/coder-base:latest
            CODER_VERSION=${{ env.CODER_FORCE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image info
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Image built successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "To pull the image:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "To run the image:"
          echo "  docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --help"
