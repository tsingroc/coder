# Docker Image Build for Fork Repository
# This workflow builds and pushes Docker images for tsingroc/coder fork
name: Docker Build (Fork)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push Docker image to registry'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        run: |
          npm install -g pnpm

      - name: Install dependencies
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/golang/mock/mockgen@latest
          go install storj.io/drpc/cmd/protoc-gen-go-drpc@latest

      - name: Build slim binaries
        run: |
          make gen/mark-fresh
          make build-slim
          ls -lh build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,format=short

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v6.8.0
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/coder/coder-base:latest
            CODER_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Docker image (arm64)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6.8.0
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/coder/coder-base:latest
            CODER_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Docker image (armv7)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6.8.0
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/coder/coder-base:latest
            CODER_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image digests
        run: |
          echo "✅ Image built successfully!"
          echo "📦 Tags: ${{ steps.meta.outputs.tags }}"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "🚀 Images pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            echo ""
            echo "To pull the image:"
            echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo ""
            echo "To run the image:"
            echo "  docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --help"
          fi
